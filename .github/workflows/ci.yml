name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Compile all specs
        run: npx tsx src/compiler/cli.ts compile-all --out-dir ./ci-output --spec-dir ./specs

      - name: Validate compiled JSON
        run: npx tsx src/compiler/cli.ts validate --dir ./ci-output

      - name: Run tests
        run: npm test
